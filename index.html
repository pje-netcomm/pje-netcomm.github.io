<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PJE Netcomm</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --text: #1f2430;
        --muted: #4c5567;
        --card: #ffffff;
        --line: #dde2ec;
        --accent: #3657ff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
        color: var(--text);
      }

      main {
        max-width: 840px;
        margin: 0 auto;
        padding: 64px 20px 80px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 3.5vw, 2.7rem);
        letter-spacing: -0.02em;
      }

      .lead {
        margin: 0 0 36px;
        color: var(--muted);
        font-size: 1.06rem;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 14px;
      }

      a.card {
        display: block;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
        color: inherit;
        text-decoration: none;
        transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      }

      a.card:hover,
      a.card:focus-visible {
        transform: translateY(-1px);
        border-color: #cfd7e6;
        box-shadow: 0 10px 24px rgba(31, 36, 48, 0.08);
        outline: none;
      }

      .path {
        color: var(--accent);
        font-size: 0.95rem;
        font-weight: 600;
      }

      .desc {
        margin-top: 8px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PJE Netcomm</h1>
      <p class="lead">Projects, experiments, and useful little tools.</p>
      <ul>
        <li>
          <a class="card" href="/jantris">
            <div class="path">/jantris</div>
            <div class="desc">Agentic coding experiment that might be a playable blocks game</div>
          </a>
        </li>
        <li>
          <a class="card" href="/selector-5000">
            <div class="path">/selector-5000</div>
            <div class="desc">A less boring random "thing" selector</div>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
